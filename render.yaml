# Render Blueprint — one-click deploy for VoteBox.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: votebox
    runtime: node
    plan: starter # persistent disks require a paid instance (free tier can't keep data)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: SESSION_SECRET
        generateValue: true # Render generates a secure random value automatically
      # SLEEPER_LEAGUE_ID is baked into the app (1365139935241191424);
      # uncomment to override:
      # - key: SLEEPER_LEAGUE_ID
      #   value: "1365139935241191424"
    disk:
      name: votebox-data # holds the SQLite DB: polls, votes, and sessions
      mountPath: /data
      sizeGB: 1
