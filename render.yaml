# Render Blueprint — free one-click deploy for VoteBox.
# Data lives in a free Turso database (set the two env vars below in the
# Render dashboard), so no persistent disk / paid plan is required.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: votebox
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true # Render generates a secure random value automatically
      # Paste these two from your free Turso database (app.turso.tech):
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # SLEEPER_LEAGUE_ID is baked into the app (1365139935241191424);
      # uncomment to override:
      # - key: SLEEPER_LEAGUE_ID
      #   value: "1365139935241191424"
